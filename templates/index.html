<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABSA Review Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0e;
    --surface:  #181817;
    --border:   #2a2a28;
    --muted:    #555550;
    --text:     #e8e6e0;
    --text-dim: #8a887f;
    --accent:   #d4a853;
    --pos:      #4caf82;
    --neg:      #e05c5c;
    --radius:   10px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-mono:    'DM Mono', monospace;
  }

  body {
    font-family: var(--font-mono);
    max-width: 680px;
    margin: 60px auto;
    padding: 0 20px 80px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 9px;
    border-radius: 4px;
    margin-bottom: 16px;
    opacity: 0.85;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  h1 em { font-style: italic; color: var(--accent); }

  p.desc { color: var(--text-dim); font-size: 13px; margin-bottom: 36px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }

  label.field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    height: 120px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  button {
    margin-top: 14px;
    padding: 10px 26px;
    font-size: 13px;
    font-family: var(--font-mono);
    font-weight: 500;
    letter-spacing: 0.05em;
    background: var(--accent);
    color: #0f0f0e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover:not(:disabled) { opacity: 0.88; }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  #results { margin-top: 10px; }

  .results-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th {
    text-align: left;
    border-bottom: 2px solid var(--border);
    padding: 8px 10px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface); }

  .pos { color: var(--pos); font-weight: 500; }
  .neg { color: var(--neg); font-weight: 500; }

  .msg { font-size: 14px; color: var(--text-dim); margin-top: 16px; }
</style>
</head>
<body>

<div class="badge">ABSA · NLP</div>
<h1>Review <em>Analyzer</em></h1>
<p class="desc">Enter a review to see aspect-level sentiment.</p>

<div class="card">
  <label class="field-label" for="reviewInput">Review text</label>
  <textarea id="reviewInput" placeholder="Type or paste a review here..."></textarea>
  <br />
  <button id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<script>
  async function runAnalysis() {
    const text = document.getElementById('reviewInput').value.trim();
    if (!text) return;

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = 'Analyzing...';
    document.getElementById('results').innerHTML = '';

    try {
      const res  = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();

      if (data.error) {
        document.getElementById('results').innerHTML = `<p class="msg">Error: ${data.error}</p>`;
        return;
      }

      if (!data.results || data.results.length === 0) {
        document.getElementById('results').innerHTML = `<p class="msg">No aspects detected.</p>`;
        return;
      }

      let rows = data.results.map(r => {
        const cls = r.sentiment === 'positive' ? 'pos' : 'neg';
        const pct = Math.round(r.confidence * 100);
        return `<tr>
          <td>${r.aspect}</td>
          <td class="${cls}">${r.sentiment}</td>
          <td>${pct}%</td>
        </tr>`;
      }).join('');

      document.getElementById('results').innerHTML = `
        <div class="results-label">${data.results.length} aspect${data.results.length > 1 ? 's' : ''} detected</div>
        <table>
          <thead><tr><th>Aspect</th><th>Sentiment</th><th>Confidence</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch (err) {
      document.getElementById('results').innerHTML = `<p class="msg">Could not reach the server.</p>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze';
    }
  }
</script>

</body>
</html>
